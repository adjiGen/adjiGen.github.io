<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="#">AdjiGen</a>

      <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="#">Kegiatan</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/ProfileProfesional/">Profile Profesional</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <div>
      <h1>Selamat Datang</h1>
      <p>Website sederhana menggunakan Bootstrap</p>
      <button class="btn btn-gold btn-lg mt-3">Pelajari Lebih Lanjut</button>
    </div>
  </section>

  <!-- Cards -->
  <section class="card-section">
    <div class="container">
      <div class="row g-4">

        <div class="col-md-4">
          <div class="card custom-card">
            <img src="https://picsum.photos/400/250?1" class="card-img-top" alt="">
            <div class="card-body">
              <h5 class="card-title">Card 1</h5>
              <p class="card-text">
                Deskripsi singkat card pertama.
              </p>
              <a href="#" class="btn btn-gold">Detail</a>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card custom-card">
            <img src="https://picsum.photos/400/250?2" class="card-img-top" alt="">
            <div class="card-body">
              <h5 class="card-title">Card 2</h5>
              <p class="card-text">
                Deskripsi singkat card kedua.
              </p>
              <a href="#" class="btn btn-gold">Detail</a>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card custom-card">
            <img src="https://picsum.photos/400/250?3" class="card-img-top" alt="">
            <div class="card-body">
              <h5 class="card-title">Card 3</h5>
              <p class="card-text">
                Deskripsi singkat card ketiga.
              </p>
              <a href="#" class="btn btn-gold">Detail</a>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
